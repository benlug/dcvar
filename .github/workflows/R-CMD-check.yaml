on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

name: R-CMD-check

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    # The main matrix exercises the package API through the default rstan
    # backend. Only the ubuntu-latest / R-release job also installs CmdStan
    # so that cmdstanr-specific regression tests can run when the backend is
    # actually available.
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest, r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest, r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest, r: 'release'}
          - {os: ubuntu-latest, r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true
          extra-repositories: https://stan-dev.r-universe.dev

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - name: Install qpdf (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y qpdf

      - name: Install qpdf (macOS)
        if: runner.os == 'macOS'
        run: brew install qpdf

      - name: Install qpdf (Windows)
        if: runner.os == 'Windows'
        run: choco install qpdf --no-progress

      - name: Install CmdStan
        if: matrix.config.os == 'ubuntu-latest' && matrix.config.r == 'release'
        run: |
          cmdstanr::check_cmdstan_toolchain(fix = TRUE)
          cmdstanr::install_cmdstan(cores = 2, quiet = TRUE)
          cat(
            paste0("CMDSTAN=", cmdstanr::cmdstan_path(), "\n"),
            file = Sys.getenv("GITHUB_ENV"),
            append = TRUE
          )
        shell: Rscript {0}

      - name: Verify cmdstanr backend availability
        if: matrix.config.os == 'ubuntu-latest' && matrix.config.r == 'release'
        run: |
          if (!requireNamespace("cmdstanr", quietly = TRUE)) {
            stop("cmdstanr was expected to be installed for the backend lane.")
          }
          path <- cmdstanr::cmdstan_path()
          message("Using CmdStan at: ", path)
          message("CmdStan version: ", paste(cmdstanr::cmdstan_version(), collapse = "."))
        shell: Rscript {0}

      # Keep the package check itself CRAN-like; the heavier fit regressions run
      # explicitly in these focused steps under NOT_CRAN.
      - name: Focused rstan regression tests
        if: matrix.config.os == 'ubuntu-latest' && matrix.config.r == 'release'
        env:
          NOT_CRAN: true
        run: |
          testthat::test_local(
            ".",
            filter = "convergence|fit-(dcvar|hmm|constant)|extract|predict|plot",
            reporter = testthat::SummaryReporter$new()
          )
        shell: Rscript {0}

      - name: Focused CmdStan regression tests
        if: matrix.config.os == 'ubuntu-latest' && matrix.config.r == 'release'
        env:
          NOT_CRAN: true
        run: |
          if (!requireNamespace("cmdstanr", quietly = TRUE)) {
            message("Skipping CmdStan regression tests: cmdstanr is not installed.")
            quit(status = 0)
          }
          if (is.null(tryCatch(cmdstanr::cmdstan_path(), error = function(e) NULL))) {
            message("Skipping CmdStan regression tests: CmdStan is not installed.")
            quit(status = 0)
          }
          testthat::test_local(
            ".",
            filter = "cmdstanr",
            reporter = testthat::SummaryReporter$new()
          )
        shell: Rscript {0}

      - uses: r-lib/actions/check-r-package@v2
        env:
          # cmdstanr is an optional backend. The dedicated Ubuntu release lane
          # installs and exercises it explicitly; the main matrix should not
          # fail R CMD check just because that Suggests package is unavailable.
          _R_CHECK_FORCE_SUGGESTS_: false
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual")'
